<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Heap visualization</title>
        <link rel="stylesheet" href="index.css" />
    </head>
    <body>
        <!--
        크기 측정을 위한 노드
        실제로 하는 일 없음
        -->
        <div
            class="heap-node"
            id="size"
            style="
                opacity: 0;
                position: absolute;
                top: -100px;
                left: -100px;
                z-index: -9999;
            "
        ></div>

        <div id="nodes">
            <canvas></canvas>
        </div>

        <input type="number" id="key" />
        <button id="add">Add</button>
        <button id="pop">Pop</button>
        <input type="range" min="0" max="9" id="speed" />

        <script src="index.js"></script>
    </body>
</html>
